- name: Deploy platforms-lab Flask stack
  hosts: web
  become: false

  vars:
    project_dir: "{{ playbook_dir }}/.."
    app_url: "http://localhost:5050/health"

  tasks:
    - name: Validate Docker is installed
      ansible.builtin.command: docker --version
      changed_when: false

    - name: Validate Docker Compose is available
      ansible.builtin.command: docker compose version
      changed_when: false

    - name: Validate Docker Compose configuration
      ansible.builtin.command: docker compose config
      args:
        chdir: "{{ project_dir }}"
      changed_when: false

    - name: Build and start Docker Compose stack
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: "{{ project_dir }}"

    - name: Wait for Flask health endpoint
      ansible.builtin.uri:
        url: "{{ app_url }}"
        method: GET
        status_code: 200
      register: health_check
      retries: 10
      delay: 3
      until: health_check.status == 200
