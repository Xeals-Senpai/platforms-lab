name: Runner Test

on:
  workflow_dispatch:

jobs:
  test-runner:
    runs-on:
      - self-hosted
      - deployment-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show machine info
        shell: powershell
        run: |
          Write-Host "Runner is working!"
          hostname
          whoami
          Get-Location